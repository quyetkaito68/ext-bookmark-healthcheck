<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bookmark Health Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 24px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e8eaf6;
    }
    .logo { font-size: 32px; text-align: center; margin-bottom: 12px; }
    h2 { font-size: 15px; font-weight: 600; text-align: center; color: #90caf9; margin-bottom: 6px; }
    p { font-size: 12px; color: #9e9e9e; text-align: center; line-height: 1.6; margin-bottom: 20px; }
    button {
      width: 100%;
      padding: 11px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1557b0; }
  </style>
</head>
<body>
  <div class="logo">🔍</div>
  <h2>Bookmark Health Checker</h2>
  <p>Quét và tìm các bookmark không truy cập được.<br>Phân loại theo mã lỗi HTTP.</p>
  <button id="startBtn">Bắt đầu quét</button>
  <script src="popup.js"></script>
</body>
</html>
