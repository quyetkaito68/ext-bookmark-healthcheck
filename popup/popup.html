<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bookmark Health Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 24px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e8eaf6;
    }
    .logo { font-size: 32px; text-align: center; margin-bottom: 12px; }
    h2 { font-size: 15px; font-weight: 600; text-align: center; color: #90caf9; margin-bottom: 6px; }
    p { font-size: 12px; color: #9e9e9e; text-align: center; line-height: 1.6; margin-bottom: 20px; }
    button {
      width: 100%;
      padding: 11px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1557b0; }
    .search-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #2d2d4a;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 10px 32px 10px 12px;
      background: #16213e;
      border: 1px solid #3d3d5c;
      border-radius: 6px;
      color: #e8eaf6;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-box input:focus { border-color: #1a73e8; }
    .search-box input::placeholder { color: #616161; }
    .clear-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: #9e9e9e;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .clear-btn:hover { background: rgba(255,255,255,0.1); }
    .search-results {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 8px;
    }
    .search-results::-webkit-scrollbar { width: 6px; }
    .search-results::-webkit-scrollbar-track { background: transparent; }
    .search-results::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 3px; }
    .search-item {
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .search-item:hover { background: #16213e; }
    .search-item-title {
      font-size: 13px;
      font-weight: 500;
      color: #e8eaf6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-item-url {
      font-size: 11px;
      color: #9e9e9e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .search-item-path {
      font-size: 10px;
      color: #616161;
      margin-top: 2px;
    }
    .no-results {
      text-align: center;
      color: #9e9e9e;
      font-size: 12px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="logo">🔍</div>
  <h2>Bookmark Health Checker</h2>
  <p>Quét và tìm các bookmark không truy cập được.<br>Phân loại theo mã lỗi HTTP.</p>
  <button id="startBtn">Bắt đầu quét</button>

  <div class="search-section">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Tìm bookmark..." />
      <button id="clearSearch" class="clear-btn" style="display:none">×</button>
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
