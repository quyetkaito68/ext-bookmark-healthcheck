<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Health Checker</title>
  <link rel="stylesheet" href="results.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-title">
      <span class="header-icon">🔍</span>
      <h1>Bookmark Health Checker</h1>
    </div>
    <button id="scanBtn" class="btn-primary">Bắt đầu quét</button>
  </header>

  <!-- Progress -->
  <div id="progressSection" class="progress-section hidden">
    <div class="progress-info">
      <span id="progressText">Đang chuẩn bị...</span>
      <span id="progressStats"></span>
    </div>
    <div class="progress-track">
      <div id="progressBar" class="progress-fill"></div>
    </div>
    <div class="progress-sub">
      <span id="progressCount">0 / 0</span>
      <span id="foundCount" class="found-badge">0 lỗi</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar" class="toolbar hidden">
    <div class="toolbar-left">
      <label class="check-label">
        <input type="checkbox" id="selectAll">
        <span>Chọn tất cả</span>
      </label>
      <div class="separator"></div>
      <select id="filterCode" class="filter-select">
        <option value="all">Tất cả lỗi</option>
      </select>
      <span id="resultCount" class="result-count">0 kết quả</span>
    </div>
    <div class="toolbar-right">
      <button id="deleteBtn" class="btn-delete" disabled>
        Xóa đã chọn <span id="deleteBtnCount">(0)</span>
      </button>
    </div>
  </div>

  <!-- Results -->
  <main id="resultsMain" class="results-main">
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">✅</div>
      <div class="empty-title">Tất cả bookmark đều hoạt động!</div>
      <div class="empty-sub">Không tìm thấy bookmark nào bị lỗi.</div>
    </div>

    <div id="initialState" class="empty-state">
      <div class="empty-icon">🔖</div>
      <div class="empty-title">Sẵn sàng quét</div>
      <div class="empty-sub">Nhấn "Bắt đầu quét" để kiểm tra bookmark của bạn.</div>
    </div>

    <table id="resultsTable" class="results-table hidden">
      <thead>
        <tr>
          <th class="col-check"></th>
          <th class="col-code">Mã lỗi</th>
          <th class="col-name">Tên bookmark</th>
          <th class="col-url">Đường dẫn</th>
          <th class="col-path">Vị trí</th>
        </tr>
      </thead>
      <tbody id="resultsTbody"></tbody>
    </table>
  </main>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <h3 class="modal-title">Xác nhận xóa</h3>
      <p id="confirmMsg" class="modal-body"></p>
      <div class="modal-footer">
        <button id="confirmNo" class="btn-gray">Không</button>
        <button id="confirmYes" class="btn-red">Có</button>
      </div>
    </div>
  </div>

  <script type="module" src="results.js"></script>
</body>
</html>
